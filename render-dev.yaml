version: "1"
projects:
  - name: My project
    environments:
      - name: Development
        services:
          - type: web
            name: go-carbon-prototype-dev
            runtime: go
            repo: https://github.com/Newland-Payment-Technology-US-Co-Ltd/go-carbon-prototype
            branch: develop
            plan: starter
            envVars:
              - key: GRACEFUL_RESTART
                value: false
              - key: LOG_LEVEL
                value: info
              - key: LOG_FORMAT
                value: json
              - fromGroup: EnvGroup-Dev
            region: ohio
            buildCommand: 'go build -ldflags="-s -w" -o full-server .'
            startCommand: './full-server -config config.yaml'
            healthCheckPath: '/health'
            autoDeployTrigger: commit
            rootDir: './composites-server/full'
          - type: web
            name: carbon-next-demo-dev
            runtime: node
            repo: https://github.com/Newland-Payment-Technology-US-Co-Ltd/carbon-next-demo
            branch: develop
            plan: starter
            envVars:
              - key: PORT
                value: 10000
              - key: TERMINAL_SERVICE_URL
                value: 'http://go-carbon-prototype-dev:10000'
              - key: AUTH_SESSION_SECRET
                sync: false
              - fromGroup: EnvGroup-Dev
            region: ohio
            buildCommand: 'pnpm install && pnpm db:generate && pnpm --filter web build'
            startCommand: 'pnpm --filter web start'
            healthCheckPath: '/api/health'
            autoDeployTrigger: commit
          - type: pserv
            name: docker-pgbouncer
            runtime: docker
            repo: https://github.com/edoburu/docker-pgbouncer
            plan: starter
            envVars:
              - key: DATABASE_URL
                fromDatabase:
                  name: 前端测试数据库
                  property: connectionString
              - key: DEFAULT_POOL_SIZE
                value: 20
              - key: MAX_CLIENT_CONN
                value: 100
              - key: SERVER_RESET_QUERY
                value: 'DISCARD ALL'
              - key: POOL_MODE
                value: transaction
              - fromGroup: EnvGroup-Dev
            region: ohio
            dockerContext: .
            dockerfilePath: ./Dockerfile
            autoDeployTrigger: commit
          - type: web
            name: cloud-fe
            runtime: node
            repo: https://github.com/sinjinshi/cloud-fe
            branch: framework-ui-admindemo
            plan: standard
